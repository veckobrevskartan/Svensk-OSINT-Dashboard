<style>
:root {
  --bg: #0f1923;
  --bg2: #152130;
  --bg3: #1c2d3f;
  --bg4: #243547;
  --card: #1a2840;
  --card-border: #2a3f58;
  --accent: #4a9eff;
  --accent2: #2a7de1;
  --text: #e8edf3;
  --text2: #9aacbe;
  --text3: #6b839b;
  --tag-bg: #1f3450;
  --tag-text: #7eb8f7;
  --pmesii-P: #7c6fd4; --pmesii-P-bg: #251e4a;
  --pmesii-M: #e05252; --pmesii-M-bg: #3a1a1a;
  --pmesii-E: #52b876; --pmesii-E-bg: #163025;
  --pmesii-S: #e8a030; --pmesii-S-bg: #352408;
  --pmesii-INFO: #4a9eff; --pmesii-INFO-bg: #0d2540;
  --pmesii-INFRA: #e8784a; --pmesii-INFRA-bg: #3a1f0d;
  --cat-HYBRID: #9b59b6; --cat-MIL: #e74c3c; --cat-INFRA: #e67e22;
  --cat-INTEL: #3498db; --cat-DRONE: #1abc9c; --cat-TERROR: #c0392b;
  --cat-NUCLEAR: #f39c12; --cat-MAR: #2980b9; --cat-GPS: #27ae60;
  --cat-POLICY: #8e44ad; --cat-LEGAL: #7f8c8d;
  --radius: 8px; --radius-lg: 12px;
  --transition: 0.15s ease;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; font-size: 15px; line-height: 1.6; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
button { cursor: pointer; font-family: inherit; }

/* HEADER */
#site-header { background: var(--bg2); border-bottom: 1px solid var(--card-border); padding: 0 1.5rem; }
.header-inner { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; gap: 1.5rem; padding: 0.875rem 0; }
.logo { display: flex; align-items: center; gap: 0.75rem; }
.logo-mark { width: 36px; height: 36px; background: var(--accent2); border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.logo-mark svg { width: 20px; height: 20px; fill: #fff; }
.logo-text { line-height: 1.2; }
.logo-title { font-size: 16px; font-weight: 600; color: var(--text); }
.logo-sub { font-size: 12px; color: var(--text3); }
.header-search { flex: 1; max-width: 560px; }
.search-wrap { position: relative; }
.search-wrap input { width: 100%; background: var(--bg3); border: 1px solid var(--card-border); border-radius: var(--radius); padding: 0.5rem 2.5rem 0.5rem 2.25rem; color: var(--text); font-size: 14px; outline: none; transition: border-color var(--transition); }
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--text3); }
.search-icon { position: absolute; left: 0.65rem; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }
.search-clear { position: absolute; right: 0.65rem; top: 50%; transform: translateY(-50%); color: var(--text3); background: none; border: none; padding: 2px; display: none; }
.search-clear.visible { display: block; }
.header-links { display: flex; gap: 1rem; flex-shrink: 0; }
.header-links a { font-size: 13px; color: var(--text2); white-space: nowrap; }
.header-links a:hover { color: var(--accent); text-decoration: none; }

/* SEARCH MODE TOGGLE */
.search-mode { display: flex; gap: 0.5rem; align-items: center; padding: 0.4rem 0.75rem; background: var(--bg2); border-bottom: 1px solid var(--card-border); font-size: 12px; color: var(--text3); }
.search-mode-inner { max-width: 1400px; margin: 0 auto; display: flex; gap: 0.75rem; align-items: center; }
.mode-btn { background: none; border: 1px solid var(--card-border); border-radius: 4px; padding: 2px 8px; font-size: 11px; color: var(--text3); transition: all var(--transition); }
.mode-btn.active, .mode-btn:hover { background: var(--tag-bg); border-color: var(--accent); color: var(--accent); }
#mode-label { color: var(--text2); }

/* LAYOUT */
.app-layout { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 260px 1fr; gap: 0; min-height: calc(100vh - 120px); }
.sidebar { background: var(--bg2); border-right: 1px solid var(--card-border); padding: 1rem; position: sticky; top: 0; height: calc(100vh - 120px); overflow-y: auto; }
.main { padding: 1rem 1.25rem; }

/* ACTIVE FILTERS BAR */
#active-filters { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.875rem; min-height: 0; }
.active-tag { display: inline-flex; align-items: center; gap: 0.3rem; background: var(--tag-bg); border: 1px solid var(--accent2); border-radius: 20px; padding: 2px 10px 2px 8px; font-size: 12px; color: var(--accent); }
.active-tag button { background: none; border: none; color: var(--accent); padding: 0; font-size: 14px; line-height: 1; }
#clear-all { background: none; border: 1px solid var(--card-border); border-radius: 20px; padding: 2px 10px; font-size: 12px; color: var(--text3); }
#clear-all:hover { border-color: var(--accent); color: var(--accent); }

/* RESULTS BAR */
.results-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
.results-count { font-size: 13px; color: var(--text3); }
.results-count strong { color: var(--text2); }
.sort-wrap { display: flex; align-items: center; gap: 0.5rem; font-size: 13px; color: var(--text3); }
.sort-wrap select { background: var(--bg3); border: 1px solid var(--card-border); border-radius: var(--radius); padding: 4px 8px; color: var(--text2); font-size: 12px; cursor: pointer; }

/* SIDEBAR SECTIONS */
.filter-section { margin-bottom: 1.25rem; }
.filter-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 0.5rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--card-border); }
.filter-options { display: flex; flex-direction: column; gap: 2px; }
.filter-opt { display: flex; align-items: center; gap: 0.5rem; padding: 4px 6px; border-radius: 5px; cursor: pointer; transition: background var(--transition); font-size: 13px; color: var(--text2); user-select: none; }
.filter-opt:hover { background: var(--bg3); }
.filter-opt input { accent-color: var(--accent); }
.pmesii-badge { display: inline-block; width: 52px; padding: 1px 6px; border-radius: 3px; font-size: 11px; font-weight: 600; text-align: center; }
.cat-badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 11px; font-weight: 600; }
.filter-search { width: 100%; background: var(--bg3); border: 1px solid var(--card-border); border-radius: 5px; padding: 4px 8px; color: var(--text); font-size: 12px; margin-bottom: 0.4rem; outline: none; }
.filter-search:focus { border-color: var(--accent); }
.year-filter, .week-filter { width: 100%; background: var(--bg3); border: 1px solid var(--card-border); border-radius: 5px; padding: 4px 8px; color: var(--text); font-size: 12px; margin-bottom: 0.4rem; cursor: pointer; outline: none; }
.year-filter:focus, .week-filter:focus { border-color: var(--accent); }

/* POST CARDS */
.post-grid { display: flex; flex-direction: column; gap: 0.75rem; }
.post-card { background: var(--card); border: 1px solid var(--card-border); border-radius: var(--radius-lg); padding: 1rem 1.125rem; transition: border-color var(--transition), transform var(--transition); }
.post-card:hover { border-color: var(--accent2); transform: translateY(-1px); }
.card-meta-top { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; flex-wrap: wrap; }
.card-date { font-size: 12px; color: var(--text3); }
.card-week { font-size: 11px; color: var(--text3); background: var(--bg3); padding: 1px 6px; border-radius: 3px; }
.card-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 0.4rem; line-height: 1.4; }
.card-title a { color: var(--text); }
.card-title a:hover { color: var(--accent); text-decoration: none; }
.card-summary { font-size: 13px; color: var(--text2); line-height: 1.55; margin-bottom: 0.65rem; }
.card-tags { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-bottom: 0.5rem; }
.card-footer { display: flex; align-items: center; justify-content: space-between; }
.card-countries { font-size: 11px; color: var(--text3); }
.card-links { display: flex; gap: 0.6rem; }
.card-links a { font-size: 12px; color: var(--text3); padding: 2px 6px; border: 1px solid var(--card-border); border-radius: 4px; transition: all var(--transition); }
.card-links a:hover { border-color: var(--accent); color: var(--accent); text-decoration: none; }

/* PMESII TAGS */
.tag-P { background: var(--pmesii-P-bg); color: var(--pmesii-P); }
.tag-M { background: var(--pmesii-M-bg); color: var(--pmesii-M); }
.tag-E { background: var(--pmesii-E-bg); color: var(--pmesii-E); }
.tag-S { background: var(--pmesii-S-bg); color: var(--pmesii-S); }
.tag-INFO { background: var(--pmesii-INFO-bg); color: var(--pmesii-INFO); }
.tag-INFRA { background: var(--pmesii-INFRA-bg); color: var(--pmesii-INFRA); }
.tag { display: inline-flex; align-items: center; border-radius: 4px; padding: 1px 7px; font-size: 11px; font-weight: 600; letter-spacing: 0.03em; }

/* CATEGORY TAGS */
.cat { display: inline-flex; align-items: center; border-radius: 4px; padding: 1px 7px; font-size: 11px; font-weight: 500; }
.cat-HYBRID { background: #2a1540; color: #c084fc; }
.cat-MIL { background: #3a1010; color: #f87171; }
.cat-INFRA { background: #2e1800; color: #fb923c; }
.cat-INTEL { background: #0d2038; color: #60a5fa; }
.cat-DRONE { background: #0d2e2a; color: #34d399; }
.cat-TERROR { background: #3a0a0a; color: #fca5a5; }
.cat-NUCLEAR { background: #2e1f00; color: #fbbf24; }
.cat-MAR { background: #0a2038; color: #38bdf8; }
.cat-GPS { background: #0d2e18; color: #4ade80; }
.cat-POLICY { background: #1e0d38; color: #a78bfa; }
.cat-LEGAL { background: #1e2028; color: #94a3b8; }

/* PAGINATION */
.pagination { display: flex; justify-content: center; gap: 0.4rem; margin-top: 1.25rem; padding-bottom: 2rem; }
.page-btn { background: var(--bg3); border: 1px solid var(--card-border); border-radius: var(--radius); padding: 6px 12px; color: var(--text2); font-size: 13px; transition: all var(--transition); }
.page-btn.active { background: var(--accent2); border-color: var(--accent); color: #fff; }
.page-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }
.page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* EMPTY STATE */
.empty-state { text-align: center; padding: 3rem 1rem; color: var(--text3); }
.empty-state h3 { font-size: 16px; color: var(--text2); margin-bottom: 0.5rem; }

/* EMBED MODE */
body.embed-mode #site-header .header-links { display: none; }
body.embed-mode .sidebar { display: none; }
body.embed-mode .app-layout { grid-template-columns: 1fr; }
body.embed-mode .embed-open-btn { display: flex !important; }
.embed-open-btn { display: none; position: fixed; bottom: 1rem; right: 1rem; background: var(--accent2); color: #fff; border: none; border-radius: var(--radius); padding: 8px 14px; font-size: 13px; font-weight: 500; gap: 0.4rem; align-items: center; box-shadow: 0 2px 12px rgba(0,0,0,0.4); }
.embed-open-btn:hover { background: var(--accent); }

/* MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: flex-start; justify-content: center; padding: 2rem 1rem; overflow-y: auto; }
.modal-overlay.open { display: flex; }
.modal { background: var(--bg2); border: 1px solid var(--card-border); border-radius: var(--radius-lg); max-width: 720px; width: 100%; padding: 1.5rem; position: relative; }
.modal-close { position: absolute; top: 1rem; right: 1rem; background: none; border: none; color: var(--text3); font-size: 20px; }
.modal h2 { font-size: 18px; color: var(--text); margin-bottom: 0.5rem; }
.modal-date { font-size: 13px; color: var(--text3); margin-bottom: 1rem; }
.modal-summary { color: var(--text2); margin-bottom: 1rem; line-height: 1.65; }
.modal-section { margin-top: 1rem; padding-top: 0.75rem; border-top: 1px solid var(--card-border); }
.modal-section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 0.4rem; }
.modal-tags { display: flex; flex-wrap: wrap; gap: 0.35rem; }
.modal-meta-row { display: flex; gap: 1rem; font-size: 13px; color: var(--text2); margin-top: 0.5rem; flex-wrap: wrap; }
.modal-meta-row span { color: var(--text3); }
.modal-sources { list-style: none; }
.modal-sources li { font-size: 13px; }
.modal-sources li + li { margin-top: 0.25rem; }
.modal-actions { display: flex; gap: 0.75rem; margin-top: 1.25rem; flex-wrap: wrap; }
.btn-primary { background: var(--accent2); color: #fff; border: none; border-radius: var(--radius); padding: 7px 16px; font-size: 13px; font-weight: 500; }
.btn-primary:hover { background: var(--accent); }
.btn-secondary { background: none; color: var(--text2); border: 1px solid var(--card-border); border-radius: var(--radius); padding: 7px 16px; font-size: 13px; }
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

/* MOBILE */
.mobile-filter-toggle { display: none; }
@media (max-width: 900px) {
  .app-layout { grid-template-columns: 1fr; }
  .sidebar { position: static; height: auto; display: none; }
  .sidebar.open { display: block; }
  .mobile-filter-toggle { display: flex; align-items: center; gap: 0.5rem; background: var(--bg3); border: 1px solid var(--card-border); border-radius: var(--radius); padding: 6px 12px; font-size: 13px; color: var(--text2); margin-bottom: 0.75rem; }
  .header-links { display: none; }
  .header-inner { flex-wrap: wrap; }
  .header-search { max-width: 100%; width: 100%; }
}
@media (max-width: 600px) {
  .main { padding: 0.75rem; }
  .sidebar { padding: 0.75rem; }
  .modal { padding: 1rem; }
}
</style>
</head>

function getParam(k){ return new URLSearchParams(location.search).get(k); }

function loadFromURL(){
  const p = new URLSearchParams(location.search);
  if(p.get('q')) state.q = p.get('q');
  if(p.get('mode')) state.mode = p.get('mode');
  if(p.get('pmesii')) state.pmesii = p.get('pmesii').split(',').filter(Boolean);
  if(p.get('pmesiiMode')) state.pmesiiMode = p.get('pmesiiMode');
  if(p.get('cat')) state.categories = p.get('cat').split(',').filter(Boolean);
  if(p.get('year')) state.year = p.get('year');
  if(p.get('week')) state.week = p.get('week');
  if(p.get('countries')) state.countries = p.get('countries').split(',').filter(Boolean);
  if(p.get('orgs')) state.orgs = p.get('orgs').split(',').filter(Boolean);
  if(p.get('persons')) state.persons = p.get('persons').split(',').filter(Boolean);
  if(p.get('sort')) state.sort = p.get('sort');
  if(p.get('page')) state.page = parseInt(p.get('page'))||1;
  if(p.get('embed')==='1') document.body.classList.add('embed-mode');
}

function saveToURL(){
  const p = new URLSearchParams();
  if(state.q) p.set('q', state.q);
  if(state.mode!=='AND') p.set('mode', state.mode);
  if(state.pmesii.length) p.set('pmesii', state.pmesii.join(','));
  if(state.pmesiiMode!=='OR') p.set('pmesiiMode', state.pmesiiMode);
  if(state.categories.length) p.set('cat', state.categories.join(','));
  if(state.year) p.set('year', state.year);
  if(state.week) p.set('week', state.week);
  if(state.countries.length) p.set('countries', state.countries.join(','));
  if(state.orgs.length) p.set('orgs', state.orgs.join(','));
  if(state.persons.length) p.set('persons', state.persons.join(','));
  if(state.sort!=='newest') p.set('sort', state.sort);
  if(state.page>1) p.set('page', state.page);
  if(document.body.classList.contains('embed-mode')) p.set('embed','1');
  const qs = p.toString();
  history.replaceState(null,'', qs ? '?'+qs : location.pathname);
}

function tokenize(text){ return text.toLowerCase().replace(/["""]/g,'').trim().split(/\s+/).filter(Boolean); }

function matchPost(post, q, mode){
  if(!q.trim()) return true;
  const search_text = [
    post.title, post.summary, post.body||'',
    (post.keywords||[]).join(' '),
    (post.countries||[]).join(' '),
    (post.places||[]).map(p=>p.name).join(' '),
    (post.persons||[]).join(' '),
    (post.organisations||[]).join(' '),
    (post.categories||[]).join(' '),
    (post.sources||[]).map(s=>s.name).join(' ')
  ].join(' ').toLowerCase();

  if(mode==='PHRASE'){
    return search_text.includes(q.toLowerCase().replace(/^[""]|[""]$/g,''));
  }
  const tokens = tokenize(q);
  const must_not = tokens.filter(t=>t.startsWith('-')).map(t=>t.slice(1));
  const must = tokens.filter(t=>!t.startsWith('-'));
  if(must_not.some(t=>search_text.includes(t))) return false;
  if(mode==='OR') return must.some(t=>search_text.includes(t));
  return must.every(t=>search_text.includes(t));
}

function scorePost(post, q){
  if(!q.trim()) return 0;
  const tokens = tokenize(q).filter(t=>!t.startsWith('-'));
  let score = 0;
  tokens.forEach(t=>{
    if(post.title.toLowerCase().includes(t)) score += 10;
    if((post.summary||'').toLowerCase().includes(t)) score += 3;
    if((post.keywords||[]).some(k=>k.toLowerCase().includes(t))) score += 2;
  });
  return score;
}

function filterPosts(){
  return POSTS.filter(p=>{
    if(state.q && !matchPost(p, state.q, state.mode)) return false;
    if(state.pmesii.length){
      if(state.pmesiiMode==='AND'){
        if(!state.pmesii.every(v=>p.pmesii.includes(v))) return false;
      } else {
        if(!state.pmesii.some(v=>p.pmesii.includes(v))) return false;
      }
    }
    if(state.categories.length && !state.categories.some(c=>p.categories.includes(c))) return false;
    if(state.year && String(p.isoYear)!==state.year) return false;
    if(state.week){
      const pw = `${p.isoYear}-W${String(p.isoWeek).padStart(2,'0')}`;
      if(pw!==state.week) return false;
    }
    if(state.countries.length && !state.countries.some(c=>p.countries.includes(c))) return false;
    if(state.orgs.length && !state.orgs.some(o=>(p.organisations||[]).includes(o))) return false;
    if(state.persons.length && !state.persons.some(per=>(p.persons||[]).includes(per))) return false;
    if(state.timeline && !p.timeline) return false;
    if(state.map && !p.map) return false;
    if(state.linkedin && !p.linkedinUrl) return false;
    return true;
  });
}

function sortPosts(posts){
  const s = state.sort;
  if(s==='relevance' && state.q) return [...posts].sort((a,b)=>scorePost(b,state.q)-scorePost(a,state.q));
  if(s==='oldest') return [...posts].sort((a,b)=>a.published.localeCompare(b.published));
  if(s==='title') return [...posts].sort((a,b)=>a.title.localeCompare(b.title,'sv'));
  return [...posts].sort((a,b)=>b.published.localeCompare(a.published));
}

function fmtDate(iso){ const d=new Date(iso+'T12:00:00Z'); return d.toLocaleDateString('sv-SE',{year:'numeric',month:'short',day:'numeric'}); }
function fmtWeek(y,w){ return `${y}-W${String(w).padStart(2,'0')}`; }

function renderPmesiiTag(v){ return `<span class="tag tag-${v}" title="${PMESII_LABELS[v]}">${v}</span>`; }
function renderCatTag(c){ const lbl=CAT_LABELS[c]||c; return `<span class="cat cat-${c}">${lbl}</span>`; }

function renderCard(post){
  const pmesiiTags = (post.pmesii||[]).map(renderPmesiiTag).join('');
  const catTags = (post.categories||[]).map(renderCatTag).join('');
  const countries = (post.countries||[]).join(', ');
  const slug = post.slug || post.id;
  return `
  <article class="post-card" data-id="${post.id}">
    <div class="card-meta-top">
      <span class="card-date">${fmtDate(post.published)}</span>
      <span class="card-week">${fmtWeek(post.isoYear,post.isoWeek)}</span>
    </div>
    <div class="card-title"><a href="#" class="open-modal" data-id="${post.id}">${esc(post.title)}</a></div>
    <div class="card-summary">${esc(post.summary)}</div>
    <div class="card-tags">${pmesiiTags}${catTags}</div>
    <div class="card-footer">
      <div class="card-countries">${esc(countries)}</div>
      <div class="card-links">
        <a href="#" class="open-modal" data-id="${post.id}">Visa</a>
        ${post.linkedinUrl ? `<a href="${esc(post.linkedinUrl)}" target="_blank" rel="noopener noreferrer">LinkedIn ↗</a>` : ''}
      </div>
    </div>
  </article>`;
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderModal(post){
  const pmesiiTags = (post.pmesii||[]).map(renderPmesiiTag).join('');
  const catTags = (post.categories||[]).map(renderCatTag).join('');
  const sources = (post.sources||[]).map(s=>`<li><a href="${esc(s.url)}" target="_blank" rel="noopener noreferrer">${esc(s.name)} ↗</a></li>`).join('');
  return `
    <h2>${esc(post.title)}</h2>
    <div class="modal-date">${fmtDate(post.published)} &nbsp;·&nbsp; ${fmtWeek(post.isoYear,post.isoWeek)}</div>
    <div class="modal-summary">${esc(post.summary)}${post.body ? '<br><br>'+esc(post.body) : ''}</div>
    <div class="modal-section">
      <div class="modal-section-title">PMESII & Kategorier</div>
      <div class="modal-tags">${pmesiiTags}${catTags}</div>
    </div>
    ${post.countries && post.countries.length ? `<div class="modal-section"><div class="modal-section-title">Länder</div><div style="font-size:13px;color:var(--text2);">${esc(post.countries.join(', '))}</div></div>` : ''}
    ${post.keywords && post.keywords.length ? `<div class="modal-section"><div class="modal-section-title">Nyckelord</div><div style="display:flex;flex-wrap:wrap;gap:0.3rem;">${post.keywords.map(k=>`<span style="background:var(--tag-bg);color:var(--tag-text);border-radius:4px;padding:1px 7px;font-size:11px;">${esc(k)}</span>`).join('')}</div></div>` : ''}
    ${post.persons && post.persons.length ? `<div class="modal-section"><div class="modal-section-title">Personer</div><div style="font-size:13px;color:var(--text2);">${esc(post.persons.join(', '))}</div></div>` : ''}
    ${post.organisations && post.organisations.length ? `<div class="modal-section"><div class="modal-section-title">Organisationer</div><div style="font-size:13px;color:var(--text2);">${esc(post.organisations.join(', '))}</div></div>` : ''}
    ${sources ? `<div class="modal-section"><div class="modal-section-title">Källor</div><ul class="modal-sources">${sources}</ul></div>` : ''}
    <div class="modal-actions">
      ${post.linkedinUrl ? `<a href="${esc(post.linkedinUrl)}" target="_blank" rel="noopener noreferrer" class="btn-primary">LinkedIn ↗</a>` : ''}
      ${post.timeline ? `<a href="https://veckobrevskartan.github.io/tidslinjen/" target="_blank" rel="noopener noreferrer" class="btn-secondary">Tidslinje</a>` : ''}
      ${post.map ? `<a href="https://veckobrevskartan.github.io/veckobrevskartan/" target="_blank" rel="noopener noreferrer" class="btn-secondary">Karta</a>` : ''}
    </div>`;
}

function renderResults(){
  const filtered = filterPosts();
  const sorted = sortPosts(filtered);
  const total = sorted.length;
  const pages = Math.ceil(total/PER_PAGE);
  const p = Math.min(state.page, pages||1);
  const slice = sorted.slice((p-1)*PER_PAGE, p*PER_PAGE);

  const qInfo = state.q ? ` för "<strong>${esc(state.q)}</strong>"` : '';
  document.getElementById('results-count').innerHTML = `Visar <strong>${slice.length}</strong> av <strong>${total}</strong> inlägg${qInfo}`;

  const grid = document.getElementById('post-grid');
  if(slice.length===0){
    grid.innerHTML = `<div class="empty-state"><h3>Inga träffar</h3><p>Prova att ändra söktermen eller filtren.</p></div>`;
  } else {
    grid.innerHTML = slice.map(renderCard).join('');
  }

  renderPagination(p, pages);
  renderActiveFilters();
  saveToURL();
}

function renderPagination(current, total){
  const el = document.getElementById('pagination');
  if(total<=1){ el.innerHTML=''; return; }
  let html = `<button class="page-btn" ${current===1?'disabled':''} onclick="goPage(${current-1})">‹</button>`;
  for(let i=1;i<=total;i++){
    if(i===1||i===total||Math.abs(i-current)<=2){
      html+=`<button class="page-btn ${i===current?'active':''}" onclick="goPage(${i})">${i}</button>`;
    } else if(Math.abs(i-current)===3){
      html+=`<span style="color:var(--text3);padding:0 4px;">…</span>`;
    }
  }
  html+=`<button class="page-btn" ${current===total?'disabled':''} onclick="goPage(${current+1})">›</button>`;
  el.innerHTML=html;
}

function goPage(n){ state.page=n; renderResults(); window.scrollTo(0,0); }

function renderActiveFilters(){
  const el = document.getElementById('active-filters');
  let tags = [];
  if(state.q) tags.push({label:`"${state.q}"`,key:'q'});
  state.pmesii.forEach(v=>tags.push({label:`PMESII: ${v}`,key:'pmesii',val:v}));
  state.categories.forEach(c=>tags.push({label:`${CAT_LABELS[c]||c}`,key:'cat',val:c}));
  if(state.year) tags.push({label:`År: ${state.year}`,key:'year'});
  if(state.week) tags.push({label:`Vecka: ${state.week}`,key:'week'});
  state.countries.forEach(c=>tags.push({label:c,key:'country',val:c}));
  state.orgs.forEach(o=>tags.push({label:o,key:'org',val:o}));
  state.persons.forEach(p=>tags.push({label:p,key:'person',val:p}));
  if(state.timeline) tags.push({label:'På tidslinje',key:'timeline'});
  if(state.map) tags.push({label:'På karta',key:'map'});
  if(state.linkedin) tags.push({label:'LinkedIn',key:'linkedin'});

  el.innerHTML = tags.map(t=>`
    <span class="active-tag">${esc(t.label)}<button onclick="removeFilter('${t.key}','${esc(t.val||'')}')" aria-label="Ta bort filter">✕</button></span>
  `).join('') + (tags.length>1?`<button id="clear-all" onclick="clearAll()">Rensa alla</button>`:'');
}

function removeFilter(key, val){
  if(key==='q'){ state.q=''; document.getElementById('search-input').value=''; document.getElementById('search-clear').classList.remove('visible'); }
  else if(key==='pmesii'){ state.pmesii=state.pmesii.filter(v=>v!==val); updateCheckboxes('pmesii-filters',state.pmesii); }
  else if(key==='cat'){ state.categories=state.categories.filter(c=>c!==val); updateCheckboxes('category-filters',state.categories); }
  else if(key==='year'){ state.year=''; document.getElementById('year-filter').value=''; }
  else if(key==='week'){ state.week=''; document.getElementById('week-filter').value=''; }
  else if(key==='country'){ state.countries=state.countries.filter(c=>c!==val); updateCheckboxes('country-filters',state.countries); }
  else if(key==='org'){ state.orgs=state.orgs.filter(o=>o!==val); updateCheckboxes('org-filters',state.orgs); }
  else if(key==='person'){ state.persons=state.persons.filter(p=>p!==val); updateCheckboxes('person-filters',state.persons); }
  else if(key==='timeline'){ state.timeline=false; document.getElementById('filter-timeline').checked=false; }
  else if(key==='map'){ state.map=false; document.getElementById('filter-map').checked=false; }
  else if(key==='linkedin'){ state.linkedin=false; document.getElementById('filter-linkedin').checked=false; }
  state.page=1; renderResults();
}

function updateCheckboxes(containerId, values){
  document.querySelectorAll(`#${containerId} input[type=checkbox]`).forEach(cb=>{
    cb.checked=values.includes(cb.value);
  });
}

function clearAll(){
  state.q=''; state.pmesii=[]; state.categories=[]; state.year=''; state.week='';
  state.countries=[]; state.orgs=[]; state.persons=[];
  state.timeline=false; state.map=false; state.linkedin=false; state.page=1;
  document.getElementById('search-input').value='';
  document.getElementById('search-clear').classList.remove('visible');
  document.getElementById('year-filter').value='';
  document.getElementById('week-filter').value='';
  document.getElementById('filter-timeline').checked=false;
  document.getElementById('filter-map').checked=false;
  document.getElementById('filter-linkedin').checked=false;
  document.querySelectorAll('.filter-options input[type=checkbox]').forEach(cb=>cb.checked=false);
  renderResults();
}

function buildSidebarFilters(){
  const pmesiiEl = document.getElementById('pmesii-filters');
  Object.entries(PMESII_LABELS).forEach(([k,v])=>{
    const cnt = POSTS.filter(p=>p.pmesii.includes(k)).length;
    pmesiiEl.innerHTML += `<label class="filter-opt"><input type="checkbox" value="${k}" class="pmesii-cb"> <span class="tag tag-${k}">${k}</span> <span style="color:var(--text3);font-size:11px;margin-left:auto;">${cnt}</span></label>`;
  });

  const catEl = document.getElementById('category-filters');
  Object.entries(CAT_LABELS).forEach(([k,v])=>{
    const cnt = POSTS.filter(p=>p.categories.includes(k)).length;
    if(cnt===0) return;
    catEl.innerHTML += `<label class="filter-opt"><input type="checkbox" value="${k}" class="cat-cb"> <span class="cat cat-${k}">${v}</span> <span style="color:var(--text3);font-size:11px;margin-left:auto;">${cnt}</span></label>`;
  });

  const countries = [...new Set(POSTS.flatMap(p=>p.countries||[]))].sort((a,b)=>a.localeCompare(b,'sv'));
  const countryEl = document.getElementById('country-filters');
  countries.forEach(c=>{
    countryEl.innerHTML += `<label class="filter-opt"><input type="checkbox" value="${esc(c)}" class="country-cb"> ${esc(c)}</label>`;
  });

  const orgs = [...new Set(POSTS.flatMap(p=>p.organisations||[]))].filter(Boolean).sort((a,b)=>a.localeCompare(b,'sv'));
  const orgEl = document.getElementById('org-filters');
  orgs.forEach(o=>{
    orgEl.innerHTML += `<label class="filter-opt"><input type="checkbox" value="${esc(o)}" class="org-cb"> ${esc(o)}</label>`;
  });

  const persons = [...new Set(POSTS.flatMap(p=>p.persons||[]))].filter(Boolean).sort((a,b)=>a.localeCompare(b,'sv'));
  const personEl = document.getElementById('person-filters');
  persons.forEach(per=>{
    personEl.innerHTML += `<label class="filter-opt"><input type="checkbox" value="${esc(per)}" class="person-cb"> ${esc(per)}</label>`;
  });

  const weeks = [...new Set(POSTS.map(p=>fmtWeek(p.isoYear,p.isoWeek)))].sort().reverse();
  const weekEl = document.getElementById('week-filter');
  weeks.forEach(w=>{ weekEl.innerHTML += `<option value="${w}">${w}</option>`; });
}

function syncStateToFilters(){
  if(state.q){ document.getElementById('search-input').value=state.q; document.getElementById('search-clear').classList.add('visible'); }
  if(state.year) document.getElementById('year-filter').value=state.year;
  if(state.week) document.getElementById('week-filter').value=state.week;
  if(state.timeline) document.getElementById('filter-timeline').checked=true;
  if(state.map) document.getElementById('filter-map').checked=true;
  if(state.linkedin) document.getElementById('filter-linkedin').checked=true;
  updateCheckboxes('pmesii-filters', state.pmesii);
  updateCheckboxes('category-filters', state.categories);
  updateCheckboxes('country-filters', state.countries);
  updateCheckboxes('org-filters', state.orgs);
  updateCheckboxes('person-filters', state.persons);
  document.querySelectorAll('.mode-btn[data-mode]').forEach(btn=>{
    btn.classList.toggle('active', btn.dataset.mode===state.mode);
  });
  if(state.pmesiiMode==='AND'){ document.getElementById('pmesii-and-btn').classList.add('active'); document.getElementById('pmesii-or-btn').classList.remove('active'); }
}

function setupListeners(){
  let searchTimer;
  document.getElementById('search-input').addEventListener('input', e=>{
    state.q=e.target.value;
    document.getElementById('search-clear').classList.toggle('visible', !!state.q);
    state.page=1;
    clearTimeout(searchTimer);
    searchTimer=setTimeout(renderResults, 200);
  });
  document.getElementById('search-clear').addEventListener('click',()=>{
    state.q=''; document.getElementById('search-input').value='';
    document.getElementById('search-clear').classList.remove('visible');
    state.page=1; renderResults();
  });

  document.querySelectorAll('.mode-btn[data-mode]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      state.mode=btn.dataset.mode; state.page=1;
      document.querySelectorAll('.mode-btn[data-mode]').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      renderResults();
    });
  });

  document.getElementById('pmesii-and-btn').addEventListener('click',()=>{
    state.pmesiiMode='AND';
    document.getElementById('pmesii-and-btn').classList.add('active');
    document.getElementById('pmesii-or-btn').classList.remove('active');
    state.page=1; renderResults();
  });
  document.getElementById('pmesii-or-btn').addEventListener('click',()=>{
    state.pmesiiMode='OR';
    document.getElementById('pmesii-or-btn').classList.add('active');
    document.getElementById('pmesii-and-btn').classList.remove('active');
    state.page=1; renderResults();
  });

  document.getElementById('pmesii-filters').addEventListener('change', e=>{
    if(e.target.classList.contains('pmesii-cb')){
      const v=e.target.value;
      if(e.target.checked) state.pmesii.push(v); else state.pmesii=state.pmesii.filter(x=>x!==v);
      state.page=1; renderResults();
    }
  });
  document.getElementById('category-filters').addEventListener('change', e=>{
    if(e.target.classList.contains('cat-cb')){
      const v=e.target.value;
      if(e.target.checked) state.categories.push(v); else state.categories=state.categories.filter(x=>x!==v);
      state.page=1; renderResults();
    }
  });
  document.getElementById('year-filter').addEventListener('change', e=>{ state.year=e.target.value; state.page=1; renderResults(); });
  document.getElementById('week-filter').addEventListener('change', e=>{ state.week=e.target.value; state.page=1; renderResults(); });
  document.getElementById('filter-timeline').addEventListener('change', e=>{ state.timeline=e.target.checked; state.page=1; renderResults(); });
  document.getElementById('filter-map').addEventListener('change', e=>{ state.map=e.target.checked; state.page=1; renderResults(); });
  document.getElementById('filter-linkedin').addEventListener('change', e=>{ state.linkedin=e.target.checked; state.page=1; renderResults(); });

  document.getElementById('country-filters').addEventListener('change', e=>{
    if(e.target.classList.contains('country-cb')){
      const v=e.target.value;
      if(e.target.checked) state.countries.push(v); else state.countries=state.countries.filter(x=>x!==v);
      state.page=1; renderResults();
    }
  });
  document.getElementById('org-filters').addEventListener('change', e=>{
    if(e.target.classList.contains('org-cb')){
      const v=e.target.value;
      if(e.target.checked) state.orgs.push(v); else state.orgs=state.orgs.filter(x=>x!==v);
      state.page=1; renderResults();
    }
  });
  document.getElementById('person-filters').addEventListener('change', e=>{
    if(e.target.classList.contains('person-cb')){
      const v=e.target.value;
      if(e.target.checked) state.persons.push(v); else state.persons=state.persons.filter(x=>x!==v);
      state.page=1; renderResults();
    }
  });

  document.getElementById('sort-select').addEventListener('change', e=>{ state.sort=e.target.value; state.page=1; renderResults(); });

  function makeFilterSearch(inputId, containerId){
    document.getElementById(inputId).addEventListener('input', e=>{
      const q=e.target.value.toLowerCase();
      document.querySelectorAll(`#${containerId} .filter-opt`).forEach(el=>{
        const txt=el.textContent.toLowerCase();
        el.style.display=txt.includes(q)?'':'none';
      });
    });
  }
  makeFilterSearch('country-search','country-filters');
  makeFilterSearch('org-search','org-filters');
  makeFilterSearch('person-search','person-filters');

  document.getElementById('post-grid').addEventListener('click', e=>{
    const link=e.target.closest('.open-modal');
    if(!link) return;
    e.preventDefault();
    const id=link.dataset.id;
    const post=POSTS.find(p=>p.id===id);
    if(post){ openModal(post); }
  });

  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('post-modal').addEventListener('click', e=>{ if(e.target===document.getElementById('post-modal')) closeModal(); });
  document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

  document.getElementById('mobile-filter-open').addEventListener('click',()=>{ document.getElementById('sidebar').classList.add('open'); });
  document.getElementById('mobile-filter-close').addEventListener('click',()=>{ document.getElementById('sidebar').classList.remove('open'); });

  document.getElementById('sort-select').value = state.sort;
}

function openModal(post){
  document.getElementById('modal-content').innerHTML=renderModal(post);
  document.getElementById('post-modal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('post-modal').classList.remove('open');
  document.body.style.overflow='';
}

loadFromURL();
buildSidebarFilters();
syncStateToFilters();
setupListeners();
renderResults();
</script>
</body>
</html>
